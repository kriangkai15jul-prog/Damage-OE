<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Damage OE Report | ระบบแจ้งของเสียหาย</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <!-- ===== Header ===== -->
  <header class="hero">
    <div class="hero__sheen"></div>
    <div class="hero__inner">
      <div class="hero__logo">
        <!-- แทนที่ src ด้วยโลโก้โรงแรมของคุณ -->
        <img src="logo.png" alt="โลโก้โรงแรม" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="hero__logo-fallback" style="display:none;">
          <svg viewBox="0 0 48 48" width="30" height="30" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 4L4 14v6c0 12 8 20 20 24 12-4 20-12 20-24v-6L24 4z" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M24 14v20M16 20h16" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
      </div>
      <h1 class="hero__title">Damage OE Report</h1>
      <div class="hero__rule"></div>
    </div>
  </header>

  <!-- ===== Form Card ===== -->
  <main class="wrap">
    <form id="damageForm" class="card" novalidate>

      <!-- 1. วันที่ -->
      <div class="field">
        <label class="field__label">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></svg>
          </span>
          วันที่แจ้ง
        </label>
        <input type="date" id="reportDate" class="input" required>
      </div>

      <!-- 2. แผนก -->
      <div class="field">
        <label class="field__label" for="department">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 21V8l8-4 8 4v13"/><path d="M9 21v-6h6v6"/><path d="M9 11h.01M15 11h.01M9 15h.01M15 15h.01"/></svg>
          </span>
          แผนก <span class="req">*</span>
        </label>
        <select id="department" class="input select" required>
          <option value="" disabled selected>เลือกแผนก</option>
          <option value="อื่นๆ">อื่นๆ</option>
        </select>
        <input type="text" id="departmentOther" class="input input--other hidden" placeholder="ระบุแผนก...">
      </div>

      <!-- 3. สถานที่ / Outlet -->
      <div class="field">
        <label class="field__label" for="location">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 22s7-7.2 7-12.5A7 7 0 0 0 5 9.5C5 14.8 12 22 12 22z"/><circle cx="12" cy="9.5" r="2.3"/></svg>
          </span>
          สถานที่ / Outlet <span class="req">*</span>
        </label>
        <input type="text" id="location" class="input" placeholder="เช่น ห้องอาหาร, ล็อบบี้, ครัวกลาง" required>
      </div>

      <!-- 4. ประเภทของอุปกรณ์ -->
      <div class="field">
        <label class="field__label" for="equipType">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M8 2v6a4 4 0 0 0 8 0V2"/><path d="M12 12v10"/><path d="M9 22h6"/></svg>
          </span>
          ประเภทของอุปกรณ์ <span class="req">*</span>
        </label>
        <select id="equipType" class="input select" required>
          <option value="" disabled selected>เลือกประเภทอุปกรณ์</option>
          <option value="อื่นๆ">อื่นๆ</option>
        </select>
        <input type="text" id="equipTypeOther" class="input input--other hidden" placeholder="ระบุประเภทอุปกรณ์...">
      </div>

      <!-- 5. รายการของเสียหาย -->
      <div class="field">
        <label class="field__label" for="itemName">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
          </span>
          รายการของเสียหาย <span class="req">*</span>
        </label>
        <input type="text" id="itemName" class="input" list="itemSuggestions" placeholder="เลือกจากรายการ หรือพิมพ์เอง" required autocomplete="off">
        <datalist id="itemSuggestions"></datalist>
      </div>

      <!-- 6. จำนวนที่เสียหาย -->
      <div class="field">
        <label class="field__label" for="quantity">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          </span>
          จำนวนที่เสียหาย <span class="req">*</span>
        </label>
        <div class="stepper">
          <button type="button" class="stepper__btn" id="qtyMinus" aria-label="ลดจำนวน">−</button>
          <input type="number" id="quantity" class="input input--qty" min="1" value="1" required>
          <button type="button" class="stepper__btn" id="qtyPlus" aria-label="เพิ่มจำนวน">+</button>
        </div>
      </div>

      <!-- 7. สาเหตุ -->
      <div class="field">
        <label class="field__label" for="cause">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 2 2 20h20L12 2z"/><path d="M12 9v5M12 17h.01"/></svg>
          </span>
          สาเหตุ <span class="req">*</span>
        </label>
        <select id="cause" class="input select" required>
          <option value="" disabled selected>เลือกสาเหตุ</option>
          <option value="อื่นๆ">อื่นๆ</option>
        </select>
        <input type="text" id="causeOther" class="input input--other hidden" placeholder="ระบุสาเหตุ...">
      </div>

      <!-- 8. แนบรูปภาพ -->
      <div class="field">
        <label class="field__label" for="photos">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 7h3l2-3h6l2 3h3v13H4z"/><circle cx="12" cy="13" r="4"/></svg>
          </span>
          แนบรูปภาพ
        </label>
        <label class="dropzone" for="photos">
          <svg viewBox="0 0 24 24" class="dropzone__icon"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg>
          <span class="dropzone__text">แตะเพื่อถ่ายภาพ หรือเลือกรูปภาพ (ได้หลายรูป)</span>
        </label>
        <input type="file" id="photos" accept="image/*" multiple class="visually-hidden">
        <div id="previewGrid" class="preview-grid"></div>
      </div>

      <!-- 9. รายละเอียดเพิ่มเติม -->
      <div class="field">
        <label class="field__label" for="details">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M4 4h16v13H8l-4 4V4z"/><path d="M8 9h8M8 12h5"/></svg>
          </span>
          รายละเอียดเพิ่มเติม <span class="opt">(ไม่บังคับ)</span>
        </label>
        <textarea id="details" class="input textarea" rows="3" placeholder="รายละเอียดเพิ่มเติม (ถ้ามี)"></textarea>
      </div>

      <!-- 10. ชื่อผู้แจ้ง -->
      <div class="field">
        <label class="field__label" for="reporterName">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
          </span>
          ชื่อผู้แจ้ง <span class="req">*</span>
        </label>
        <input type="text" id="reporterName" class="input" placeholder="ชื่อ-นามสกุล" required>
      </div>

      <!-- Buttons -->
      <div class="actions">
        <button type="button" id="clearBtn" class="btn btn--ghost">ล้างข้อมูล</button>
        <button type="submit" id="submitBtn" class="btn btn--primary">
          <span class="btn__label">ส่งข้อมูล</span>
          <span class="btn__spinner" aria-hidden="true"></span>
        </button>
      </div>

      <p class="form-note">ทุกช่องที่มี <span class="req">*</span> จำเป็นต้องกรอก</p>
    </form>

    <footer class="footer">
      <p>© <span id="year"></span> Hotel Damage Report System</p>
      <p><a href="admin.html" class="footer__admin-link">สำหรับผู้ดูแลระบบ</a></p>
    </footer>
  </main>
</div>

<!-- ===== Success Overlay ===== -->
<div id="successOverlay" class="overlay hidden">
  <div class="success-card">
    <div class="success-check">
      <svg viewBox="0 0 52 52">
        <circle cx="26" cy="26" r="24" class="success-check__circle"/>
        <path fill="none" class="success-check__mark" d="M14 27l7 7 17-17"/>
      </svg>
    </div>
    <h2>บันทึกข้อมูลสำเร็จ</h2>
    <p>ส่งรายการแจ้งของเสียหายเรียบร้อยแล้ว</p>
    <button type="button" id="overlayCloseBtn" class="btn btn--primary">ตกลง</button>
  </div>
</div>

<!-- ===== Toast (error) ===== -->
<div id="toast" class="toast hidden"></div>

<script src="script.js"></script>
</body>
</html>
